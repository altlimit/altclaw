name: "latest-release"

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

  build-cli:
    name: CLI ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact_name: altclaw-cli-windows
            ext: .exe
          - goos: linux
            goarch: amd64
            artifact_name: altclaw-cli-linux
            ext: ""
          - goos: linux
            goarch: arm64
            artifact_name: altclaw-cli-linux-arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            artifact_name: altclaw-cli-darwin
            ext: ""
          - goos: darwin
            goarch: arm64
            artifact_name: altclaw-cli-darwin-arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Version Tag
        id: version
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"
          if [ "${{ github.run_attempt }}" -gt 1 ]; then
            TAG="${TAG}.${{ github.run_attempt }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          cd vue
          npm install
          npm run build

      - name: Build CLI
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X altclaw.ai/internal/buildinfo.Version=${{ steps.version.outputs.tag }}" \
            -o build/altclaw${{ matrix.ext }} ./cmd/altclaw/

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd build
          zip -rq ../altclaw-cli-windows.zip .

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          cd build
          tar -czf ../${{ matrix.artifact_name }}.tgz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            altclaw-cli-windows.zip
            ${{ matrix.artifact_name }}.tgz
          if-no-files-found: ignore
          retention-days: 7

  build-gui:
    name: GUI ${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            goos: windows
            goarch: amd64
            artifact_name: altclaw-gui-windows
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            artifact_name: altclaw-gui-linux
            ext: ""
          - os: macos-latest
            platform: darwin
            goos: darwin
            goarch: arm64
            artifact_name: altclaw-gui-darwin-arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Version Tag
        id: version
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"
          if [ "${{ github.run_attempt }}" -gt 1 ]; then
            TAG="${TAG}.${{ github.run_attempt }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build Frontend
        run: |
          cd vue
          npm install
          npm run build

      - name: Build GUI
        run: |
          mkdir -p build
          EXTRA_LDFLAGS=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXTRA_LDFLAGS="-H windowsgui"
          fi
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags gui -ldflags "-s -w $EXTRA_LDFLAGS -X altclaw.ai/internal/buildinfo.Version=${{ steps.version.outputs.tag }}" \
            -o build/altclaw-gui${{ matrix.ext }} ./cmd/altclaw/
        shell: bash

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build
          7z a -tzip ../altclaw-gui-windows.zip *
        shell: bash

      - name: Package (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd build
          tar -czf ../${{ matrix.artifact_name }}.tgz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            altclaw-gui-windows.zip
            ${{ matrix.artifact_name }}.tgz
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - name: Generate Version Tag
        id: version
        run: |
          TAG="v$(date -u +'%Y.%m.%d')"
          if [ "${{ github.run_attempt }}" -gt 1 ]; then
            TAG="${TAG}.${{ github.run_attempt }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect Release Files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.zip' -o -name '*.tgz' \) -exec mv {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Altclaw ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release/*
