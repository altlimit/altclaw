<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BC0EB" />
      <stop offset="20%" stop-color="#2da1d7" />
      <stop offset="100%" stop-color="#165b7e" />
    </linearGradient>
    
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E37A71" />
      <stop offset="20%" stop-color="#cc554c" />
      <stop offset="100%" stop-color="#7c2d28" />
    </linearGradient>
    
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CC" />
      <stop offset="50%" stop-color="#F1D882" />
      <stop offset="100%" stop-color="#cc9900" />
    </linearGradient>

    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CC" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Drop Shadow for the orchestrator core -->
    <filter id="coreDrop" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- LEFT FACE: BLUE PILLARS -->
  <g transform="matrix(0.866, 0.5, 0, 1, 89.73, 160)">
    <!-- Base shadows for depth within the isometric space -->
    <g fill="#000" opacity="0.3">
      <rect x="16" y="168" width="40" height="8" rx="4"/>
      <rect x="76" y="168" width="40" height="8" rx="4"/>
      <rect x="136" y="168" width="40" height="8" rx="4"/>
    </g>
    
    <!-- Module 1 (Outer, steps down) -->
    <rect x="16" y="48" width="40" height="128" rx="8" fill="url(#blueGrad)" />
    <!-- Module 2 (Middle, medium) -->
    <rect x="76" y="32" width="40" height="144" rx="8" fill="url(#blueGrad)" />
    <!-- Module 3 (Inner, tallest) -->
    <rect x="136" y="16" width="40" height="160" rx="8" fill="url(#blueGrad)" />
    
    <!-- Highlights -->
    <g fill="#FFF" opacity="0.3">
      <rect x="16" y="48" width="40" height="4" rx="2" />
      <rect x="76" y="32" width="40" height="4" rx="2" />
      <rect x="136" y="16" width="40" height="4" rx="2" />
    </g>
  </g>

  <!-- RIGHT FACE: RED PILLARS -->
  <g transform="matrix(0.866, -0.5, 0, 1, 256, 256)">
    <!-- Base shadows for depth within the isometric space -->
    <g fill="#000" opacity="0.3">
      <rect x="16" y="168" width="40" height="8" rx="4"/>
      <rect x="76" y="168" width="40" height="8" rx="4"/>
      <rect x="136" y="168" width="40" height="8" rx="4"/>
    </g>

    <!-- Module 1 (Inner, tallest) -->
    <rect x="16" y="16" width="40" height="160" rx="8" fill="url(#redGrad)" />
    <!-- Module 2 (Middle, medium) -->
    <rect x="76" y="32" width="40" height="144" rx="8" fill="url(#redGrad)" />
    <!-- Module 3 (Outer, steps down) -->
    <rect x="136" y="48" width="40" height="128" rx="8" fill="url(#redGrad)" />
    
    <!-- Highlights -->
    <g fill="#FFF" opacity="0.3">
      <rect x="16" y="16" width="40" height="4" rx="2" />
      <rect x="76" y="32" width="40" height="4" rx="2" />
      <rect x="136" y="48" width="40" height="4" rx="2" />
    </g>
  </g>

  <!-- TOP FACE: AMBER CORE (Orchestrator) -->
  <!-- Apply filter to a wrapper group so shadow projects perfectly straight down -->
  <g filter="url(#coreDrop)">
    <g transform="matrix(0.866, 0.5, -0.866, 0.5, 256, 64)">
      <!-- Main Core block -->
      <rect x="16" y="16" width="160" height="160" rx="24" fill="url(#yellowGrad)" />
      
      <!-- Inner Dark Engine Portal -->
      <rect x="48" y="48" width="96" height="96" rx="24" fill="#1A1A1A" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="4" />
      
      <!-- Inside the Portal: Glowing Claws -->
      <g stroke="url(#slashGrad)" stroke-width="12" stroke-linecap="round">
        <line x1="68" y1="68" x2="84" y2="124" />
        <line x1="96" y1="64" x2="96" y2="128" />
        <line x1="124" y1="68" x2="108" y2="124" />
      </g>
    </g>
  </g>
</svg>
